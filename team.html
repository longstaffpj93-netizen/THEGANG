<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GANG | The Crew</title>
    
    <!-- Core Scripts -->
    <script src="assets/js/core.js"></script>
    <script src="assets/js/layout.js"></script>
    
    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .carbon-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(245,158,11,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="carbon-bg min-h-screen text-slate-100 pb-20">

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <!-- Header -->
        <div class="mb-20 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-5xl md:text-6xl font-black italic uppercase tracking-tighter leading-none mb-2">The <span class="text-amber-500">Crew</span></h1>
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">Command & Control Center</p>
            </div>
        </div>

        <!-- Team Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            
            <!-- Member: PJ -->
            <div class="bg-slate-900 border-2 border-amber-500 rounded-[3rem] p-10 shadow-2xl relative overflow-hidden group hover:scale-[1.02] transition-all">
                <div class="relative z-10 flex flex-col items-center text-center">
                    <div class="w-32 h-32 rounded-full bg-amber-500 border-4 border-slate-900 flex items-center justify-center text-3xl font-black text-slate-950 mb-6 shadow-2xl relative overflow-hidden">
                        PJ
                        <!-- Add profile pic logic here if desired -->
                    </div>
                    <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white mb-2">PJ Longstaff</h2>
                    <span class="bg-amber-500/10 text-amber-500 border border-amber-500/20 px-4 py-1 rounded-full text-[9px] font-black uppercase tracking-widest mb-6">Founder • Web & Media</span>
                    
                    <p class="text-slate-400 text-xs leading-relaxed italic mb-8">
                        Founder and lead developer of Most Wanted. Building the Essex car community platform and creating professional content for car enthusiasts across the county.
                    </p>
                    
                    <a href="profile.html" class="w-full bg-slate-950 hover:bg-amber-500 hover:text-slate-950 text-white font-black py-4 rounded-2xl text-[10px] uppercase tracking-widest transition-all border border-slate-800">View Active File</a>
                </div>
                <!-- Decorative Pattern -->
                <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/5 rotate-45 translate-x-16 -translate-y-16 group-hover:bg-amber-500/10 transition-colors"></div>
            </div>

            <!-- Future Member Placeholder -->
            <div class="bg-slate-900/50 border border-slate-800 border-dashed rounded-[3rem] p-10 flex flex-col items-center justify-center text-center opacity-50">
                <div class="w-20 h-20 rounded-full border-2 border-slate-800 border-dashed flex items-center justify-center text-2xl mb-6">
                    👤
                </div>
                <h3 class="text-lg font-black italic uppercase tracking-tighter text-slate-600 mb-2">Recruiting...</h3>
                <p class="text-slate-700 text-[10px] font-bold uppercase tracking-widest">Sector Elite Only</p>
            </div>

        </div>

    </main>

</body>
</html>
