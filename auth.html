<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GANG | Authentication</title>
    
    <!-- Core Scripts -->
    <script src="assets/js/core.js"></script>
    <script src="assets/js/layout.js"></script>
    
    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .carbon-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(245,158,11,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .animate-drift {
            animation: drift 20s linear infinite;
        }
        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: 500px 500px; }
        }
    </style>
</head>
<body class="carbon-bg min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl relative overflow-hidden backdrop-blur-xl">
        
        <!-- Tab Switching -->
        <div class="flex items-center gap-4 mb-10 bg-slate-950 p-1 rounded-2xl border border-slate-800">
            <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all bg-amber-500 text-slate-950 shadow-lg">Login</button>
            <button onclick="switchTab('signup')" id="tab-signup" class="flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all text-slate-500 hover:text-white">Sign Up</button>
        </div>

        <div class="mb-8">
            <h2 id="auth-title" class="text-2xl font-black text-white italic uppercase tracking-tighter">Welcome Back</h2>
            <p class="text-slate-500 text-xs font-bold tracking-widest mt-1 uppercase">Essex's Premier Car Community</p>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="space-y-4">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 block">Email Address</label>
                <input type="email" id="login-email" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-sm text-white focus:border-amber-500 transition-all outline-none" placeholder="driver@thegang.co.uk">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 block">Password</label>
                <input type="password" id="login-password" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-sm text-white focus:border-amber-500 transition-all outline-none" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-5 rounded-2xl shadow-[0_10px_30px_rgba(245,158,11,0.2)] transition-all transform active:scale-95 text-xs uppercase tracking-widest mt-6">Engage Profile</button>
        </div>

        <!-- Signup Form (Hidden) -->
        <div id="signup-form" class="hidden space-y-4">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 block">Full Name</label>
                <input type="text" id="signup-name" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-sm text-white focus:border-amber-500 transition-all outline-none" placeholder="Vin Diesel">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 block">Email Address</label>
                <input type="email" id="signup-email" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-sm text-white focus:border-amber-500 transition-all outline-none" placeholder="driver@thegang.co.uk">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 block">Password</label>
                    <input type="password" id="signup-password" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-sm text-white focus:border-amber-500 transition-all outline-none" placeholder="••••••••">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 block">Confirm</label>
                    <input type="password" id="signup-confirm-password" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-sm text-white focus:border-amber-500 transition-all outline-none" placeholder="••••••••">
                </div>
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2 block">Car Model (Optional)</label>
                <input type="text" id="signup-car" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-sm text-white focus:border-amber-500 transition-all outline-none" placeholder="BMW M3, etc.">
            </div>
            <button onclick="handleSignup()" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-5 rounded-2xl shadow-[0_10px_30px_rgba(245,158,11,0.2)] transition-all transform active:scale-95 text-xs uppercase tracking-widest mt-6">Create Pilot ID</button>
        </div>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-[10px] text-slate-600 font-black uppercase tracking-widest hover:text-slate-400 transition-colors">← Back to Dashboard</a>
        </div>
    </div>

    <!-- Decorative Elements -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-amber-500/5 rounded-full blur-[120px] -z-10 animate-pulse"></div>

    <script>
        function switchTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const signupBtn = document.getElementById('tab-signup');
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const title = document.getElementById('auth-title');

            if (tab === 'login') {
                loginBtn.className = 'flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all bg-amber-500 text-slate-950 shadow-lg';
                signupBtn.className = 'flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all text-slate-500 hover:text-white';
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                title.innerText = "Welcome Back";
            } else {
                signupBtn.className = 'flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all bg-amber-500 text-slate-950 shadow-lg';
                loginBtn.className = 'flex-1 py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all text-slate-500 hover:text-white';
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                title.innerText = "Join the Gang";
            }
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) return UI.toast("Missing Credentials", "error");

            const users = DB.get(DB.USERS);
            const user = users.find(u => u.email === email && u.password === btoa(password));

            if (user) {
                localStorage.setItem(DB.CURRENT_USER, JSON.stringify(user));
                UI.toast("Welcome back, Pilot", "success");
                setTimeout(() => window.location.href = 'feed.html', 1000);
            } else {
                UI.toast("Invalid Identity", "error");
            }
        }

        function handleSignup() {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm-password').value;
            const car = document.getElementById('signup-car').value.trim();

            if (!name || !email || !password) return UI.toast("Details Required", "error");
            if (password !== confirm) return UI.toast("Passwords Desynced", "error");
            if (password.length < 6) return UI.toast("Password too short", "error");

            const users = DB.get(DB.USERS);
            if (users.find(u => u.email === email)) return UI.toast("ID Already Exists", "error");

            const newUser = {
                id: Date.now().toString(),
                name,
                email,
                password: btoa(password),
                car,
                profile: {
                    bio: 'Most Wanted Pilot',
                    cars: car ? [car] : [],
                    gallery: []
                }
            };

            users.push(newUser);
            DB.save(DB.USERS, users);
            UI.toast("Pilot ID Created", "success");
            setTimeout(() => switchTab('login'), 1500);
        }
    </script>
</body>
</html>
