<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GANG | Community Feed</title>
    
    <!-- Core Scripts -->
    <script src="assets/js/core.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/feed.js"></script>
    
    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .carbon-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(245,158,11,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="carbon-bg min-h-screen text-slate-100 pb-20">

    <main class="max-w-3xl mx-auto px-6 py-12">
        
        <!-- Header -->
        <div class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter leading-none mb-2">The <span class="text-amber-500">Feed</span></h1>
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">Live Community Transmissions</p>
            </div>
            <button onclick="toggleModal('share-modal')" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-6 py-3 rounded-2xl text-[10px] uppercase tracking-widest shadow-lg transform active:scale-95 transition-all">Create Post</button>
        </div>

        <!-- Filters -->
        <div class="flex items-center gap-3 mb-12 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="Feed.renderPosts('all')" class="bg-slate-900 border border-slate-800 px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:border-amber-500 transition-colors">All</button>
            <button onclick="Feed.renderPosts('cars')" class="bg-slate-900 border border-slate-800 px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:border-amber-500 transition-colors">🚗 Cars</button>
            <button onclick="Feed.renderPosts('meets')" class="bg-slate-900 border border-slate-800 px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:border-amber-500 transition-colors">📍 Meets</button>
            <button onclick="Feed.renderPosts('profiles')" class="bg-slate-900 border border-slate-800 px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:border-amber-500 transition-colors">👤 Pilots</button>
        </div>

        <!-- Posts Container -->
        <div id="feed-posts" class="space-y-8">
            <div class="flex items-center justify-center py-20">
                <div class="w-8 h-8 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>

    </main>

    <!-- Share Modal -->
    <div id="share-modal" class="fixed inset-0 z-[100] hidden bg-slate-950/80 backdrop-blur-xl flex items-center justify-center p-6">
        <div class="w-full max-w-lg bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter">New Transmission</h2>
                <button onclick="toggleModal('share-modal')" class="text-slate-500 hover:text-white">✕</button>
            </div>
            
            <form id="post-form" onsubmit="handlePost(event)" class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Post Content</label>
                    <textarea id="post-content" required class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-sm text-white focus:border-amber-500 transition-all outline-none min-h-[150px] resize-none" placeholder="What's happening in Essex?"></textarea>
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Category</label>
                    <select id="post-type" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs font-bold text-white outline-none focus:border-amber-500 transition-all appearance-none cursor-pointer">
                        <option value="general">📢 General</option>
                        <option value="cars">🚗 Cars</option>
                        <option value="meets">📍 Meets</option>
                        <option value="profiles">👤 Pilot Profile</option>
                    </select>
                </div>
                
                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-5 rounded-2xl text-[10px] uppercase tracking-widest shadow-lg transition-all active:scale-95">Send Broadcast</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => Feed.init());

        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
        }

        function handlePost(e) {
            e.preventDefault();
            const content = document.getElementById('post-content').value;
            const type = document.getElementById('post-type').value;
            
            Feed.sharePost(content, type);
            toggleModal('share-modal');
            document.getElementById('post-form').reset();
        }
    </script>
</body>
</html>
