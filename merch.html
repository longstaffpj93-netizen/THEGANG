<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GANG | Official Merchandise</title>
    
    <!-- Core Scripts -->
    <script src="assets/js/core.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/shop.js"></script>
    
    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .carbon-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(245,158,11,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="carbon-bg min-h-screen text-slate-100 pb-20">

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <!-- Header -->
        <div class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-5xl md:text-6xl font-black italic uppercase tracking-tighter leading-none mb-2">The <span class="text-amber-500">Shop</span></h1>
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">Official Essex Car Community Provisions</p>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="Shop.checkout()" class="relative bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-6 py-4 rounded-2xl text-[10px] uppercase tracking-widest shadow-lg transition-all active:scale-95">
                    View Bag
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-slate-950 text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-slate-950">0</span>
                </button>
            </div>
        </div>

        <!-- Category Selectors -->
        <div class="flex items-center gap-3 mb-16 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="Shop.renderProducts('all')" class="bg-slate-900 border border-slate-800 px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:border-amber-500 transition-colors">All</button>
            <button onclick="Shop.renderProducts('hoodies')" class="bg-slate-900 border border-slate-800 px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:border-amber-500 transition-colors">Hoodies</button>
            <button onclick="Shop.renderProducts('tracksuits')" class="bg-slate-900 border border-slate-800 px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:border-amber-500 transition-colors">Tracksuits</button>
            <button onclick="Shop.renderProducts('caps')" class="bg-slate-900 border border-slate-800 px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:border-amber-500 transition-colors">Caps</button>
            <button onclick="Shop.renderProducts('accessories')" class="bg-slate-900 border border-slate-800 px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:border-amber-500 transition-colors">Accessories</button>
        </div>

        <!-- Product Grid -->
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 mb-20">
            <!-- Products injected here -->
        </div>

    </main>

    <!-- Checkout Modal -->
    <div id="payment-modal" class="fixed inset-0 z-[100] hidden bg-slate-950/80 backdrop-blur-xl flex items-center justify-center p-6">
        <div class="w-full max-w-lg bg-slate-900 border border-slate-800 rounded-[2.5rem] p-8 md:p-12 shadow-2xl overflow-hidden relative">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter border-l-4 border-amber-500 pl-4">Your Bag</h2>
                <button onclick="document.getElementById('payment-modal').classList.add('hidden')" class="text-slate-500 hover:text-white transition-colors">✕</button>
            </div>

            <div id="cart-items" class="max-h-[300px] overflow-y-auto mb-10 pr-2 no-scrollbar">
                <!-- Items injected here -->
            </div>

            <div class="space-y-4 mb-10 border-t border-slate-800 pt-8">
                <div class="flex justify-between text-[10px] font-black uppercase text-slate-500 tracking-widest">
                    <span>Subtotal</span>
                    <span id="cart-total">£0.00</span>
                </div>
                <div class="flex justify-between text-[10px] font-black uppercase text-amber-500 tracking-widest">
                    <span>Shipping</span>
                    <span>Calculated at checkout</span>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <button onclick="window.open('https://paypal.me/thegang', '_blank')" class="w-full bg-slate-950 hover:bg-slate-800 text-white font-black py-5 rounded-2xl text-[10px] uppercase tracking-widest transition-all border border-slate-800 shadow-xl">💰 Pay via PayPal</button>
                <div class="bg-slate-950/50 p-6 rounded-3xl border border-slate-800/50">
                    <p class="text-[9px] font-black text-slate-600 uppercase tracking-widest mb-3">Bank Transfer Protocol</p>
                    <p class="text-xs font-black text-slate-300">SC: 40-18-04 | AC: 82732882</p>
                    <p class="text-[9px] text-slate-500 mt-2 italic">Ref: Your Name + Mobile</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => Shop.init());
    </script>
</body>
</html>
