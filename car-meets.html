<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GANG | Car Meets</title>
    
    <!-- Core Scripts -->
    <script src="assets/js/core.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/meets.js"></script>
    
    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .carbon-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(245,158,11,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="carbon-bg min-h-screen text-slate-100 pb-20">

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <!-- Header -->
        <div class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-5xl md:text-6xl font-black italic uppercase tracking-tighter leading-none mb-2">The <span class="text-amber-500">Meets</span></h1>
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em]">Official Essex Car Community Manifest</p>
            </div>
            <div class="bg-slate-900 border border-slate-800 px-6 py-4 rounded-3xl flex items-center gap-4">
                <span class="text-xs text-slate-500 font-bold uppercase tracking-widest leading-none">Status</span>
                <span class="bg-green-500/10 text-green-500 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest leading-none border border-green-500/20">All Spots Online</span>
            </div>
        </div>

        <div class="intro mb-20 max-w-2xl bg-slate-950/50 p-8 rounded-[2rem] border border-slate-800/50">
            <p class="text-slate-400 text-sm leading-relaxed italic">
                Bringing together petrolheads from across the county for epic meets, cruises, and vibes. 
                All makes, models, and styles welcome — modified, classic, JDM, supercars, you name it.
            </p>
        </div>

        <!-- Meets Grid -->
        <div id="meets-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
            <!-- Meets injected here -->
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => Meets.init());
    </script>
</body>
</html>
