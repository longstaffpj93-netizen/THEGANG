<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GANG | Pilot File</title>
    
    <!-- Core Scripts -->
    <script src="assets/js/core.js"></script>
    <script src="assets/js/layout.js"></script>
    <script src="assets/js/profile.js"></script>
    
    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .carbon-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(245,158,11,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="carbon-bg min-h-screen text-slate-100 pb-20">

    <main class="max-w-5xl mx-auto px-6 py-12">
        
        <!-- Pilot Header -->
        <div class="bg-slate-900 border-2 border-amber-500 rounded-[2.5rem] p-8 md:p-12 mb-12 shadow-[0_0_50px_rgba(245,158,11,0.1)] relative overflow-hidden">
            <div class="flex flex-col md:flex-row items-center gap-10 relative z-10">
                <div class="relative group cursor-pointer" onclick="document.getElementById('profile-upload').click()">
                    <div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-amber-500 flex items-center justify-center text-4xl font-black text-slate-950 border-4 border-slate-900 shadow-2xl relative overflow-hidden">
                        <span id="pilot-initial">D</span>
                        <img id="pilot-img" class="absolute inset-0 w-full h-full object-cover hidden">
                    </div>
                    <div class="absolute inset-0 bg-slate-950/40 rounded-full opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <span class="text-xs font-black uppercase tracking-widest text-white">Update</span>
                    </div>
                    <input type="file" id="profile-upload" class="hidden" accept="image/*" onchange="Profile.handleImageUpload(event, 'profile')">
                </div>

                <div class="flex-grow text-center md:text-left">
                    <div class="flex flex-col md:flex-row md:items-center gap-2 mb-4">
                        <h1 id="pilot-name" class="text-4xl md:text-5xl font-black italic uppercase tracking-tighter leading-none">Driver Name</h1>
                        <span class="bg-amber-500/10 text-amber-500 border border-amber-500/20 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest w-fit mx-auto md:mx-0">Most Wanted Elite</span>
                    </div>
                    <p id="pilot-email" class="text-slate-500 text-xs font-bold tracking-widest uppercase mb-8">driver@thegang.co.uk</p>
                    
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                        <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                            <span id="car-count" class="block text-2xl font-black italic text-white leading-none mb-1">0</span>
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">In Garage</span>
                        </div>
                        <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                            <span id="member-days" class="block text-2xl font-black italic text-white leading-none mb-1">0</span>
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Active Days</span>
                        </div>
                        <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                            <span class="block text-2xl font-black italic text-white leading-none mb-1">0</span>
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Wins</span>
                        </div>
                        <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                            <span class="block text-2xl font-black italic text-white leading-none mb-1">ESSEX</span>
                            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Sector</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Decorative Pattern -->
            <div class="absolute top-0 right-0 w-64 h-64 bg-amber-500/5 rotate-45 translate-x-32 -translate-y-32 -z-0"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            
            <!-- Left Column: Garage & Info -->
            <div class="lg:col-span-1 space-y-12">
                
                <!-- The Garage -->
                <section class="bg-slate-900 border border-slate-800 rounded-[2rem] p-8">
                    <h2 class="text-xl font-black italic uppercase tracking-tighter mb-8 border-l-4 border-amber-500 pl-4">The Garage</h2>
                    <div id="garage-list" class="mb-8">
                        <!-- Cars injected here -->
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="new-car-input" class="flex-grow bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-white focus:border-amber-500 transition-all outline-none" placeholder="Vehicle ID...">
                        <button onclick="Profile.addCar()" class="bg-slate-800 hover:bg-amber-500 hover:text-slate-950 text-white font-black px-4 rounded-xl transition-all">＋</button>
                    </div>
                </section>

                <!-- Status & Bio -->
                <section class="bg-slate-900 border border-slate-800 rounded-[2rem] p-8">
                    <h2 class="text-xl font-black italic uppercase tracking-tighter mb-8 border-l-4 border-amber-500 pl-4">Pilot Bio</h2>
                    <textarea id="bio-input" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-xs text-slate-300 outline-none focus:border-amber-500 transition-all min-h-[120px] resize-none mb-6" placeholder="Your mission statement..."></textarea>
                    <button onclick="Profile.saveProfile()" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-4 rounded-xl text-[10px] uppercase tracking-widest shadow-lg transition-all active:scale-95">Save File</button>
                </section>
            </div>

            <!-- Right Column: Visuals & Settings -->
            <div class="lg:col-span-2 space-y-12">
                
                <!-- Visual Feed -->
                <section class="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-8 md:p-12">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-xl font-black italic uppercase tracking-tighter border-l-4 border-amber-500 pl-4">Capture Feed</h2>
                        <button onclick="document.getElementById('gallery-upload').click()" class="text-amber-500 text-[10px] font-black uppercase tracking-widest border border-amber-500/20 px-4 py-2 rounded-full hover:bg-amber-500 hover:text-slate-950 transition-all">Upload Visual</button>
                        <input type="file" id="gallery-upload" class="hidden" accept="image/*" onchange="Profile.handleImageUpload(event, 'gallery')">
                    </div>
                    
                    <div id="image-gallery" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <!-- Images injected here -->
                    </div>
                </section>

                <!-- Customization Grid -->
                <section class="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-8 md:p-12">
                    <h2 class="text-xl font-black italic uppercase tracking-tighter mb-10 border-l-4 border-amber-500 pl-4">Profile Config</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Instagram Link</label>
                            <input type="text" id="insta-handle" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-xs text-white outline-none focus:border-amber-500 transition-all" placeholder="@username">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Primary Sector</label>
                            <input type="text" id="location-input" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-xs text-white outline-none focus:border-amber-500 transition-all" placeholder="Chelmsford, etc.">
                        </div>
                        <div class="md:col-span-2">
                            <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-3 block">Pilot Handling Style</label>
                            <select id="driving-style" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-xs font-black text-white outline-none focus:border-amber-500 transition-all appearance-none">
                                <option value="cruise">CRUISE MODE</option>
                                <option value="sport">SPORT MODE</option>
                                <option value="track">TRACK PROTOCOL</option>
                                <option value="drift">DRIFT STANCE</option>
                                <option value="show">SHOWROOM SPEC</option>
                            </select>
                        </div>
                    </div>
                    
                    <button onclick="Profile.saveProfile()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-black py-5 rounded-2xl text-[10px] uppercase tracking-widest mt-10 transition-all active:scale-95 border border-slate-700">Update Calibration</button>
                </section>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => Profile.init());
    </script>
</body>
</html>
